name: Auto Learn & Analyze

on:
  schedule:
    - cron: '3 11 * * *'  # UTC 11:00 = JST 20:00
  workflow_dispatch: {}

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Create data dirs
        run: mkdir -p data logs

      - name: Write cookies from secret
        run: echo '${{ secrets.IG_COOKIES }}' > data/ig_cookies.json

      - name: Run auto_learn
        run: python auto_learn.py

      - name: Show log
        run: cat logs/auto_learn.log || true

      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/instagram_dm.db
          git diff --cached --quiet || git commit -m "auto: learn $(date +%Y-%m-%d)"
          git push
